version: 2.1

jobs:
  build:
    working_directory: ~/ExampleApplication
    docker:
      - image: circleci/node:latest
    steps:
      - checkout
      - run:
          name: update-npm
          command: sudo npm install -g npm@8.1.4
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: install-npm
          command: npm install
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

  test:
    working_directory: ~/ExampleApplication
    docker:
      - image: circleci/node:latest
    steps:
      - checkout
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: run-tests
          command: npm run test

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy to EC2
          command: |
            sudo apt-get update
            sudo apt-get install -y openssh-client
            ssh -o StrictHostKeyChecking=no ubuntu@ec2-107-22-110-242.compute-1.amazonaws.com "
              rm -rf ExampleApplication &&
              git clone https://github.com/PrathibhaKirthi/ExampleApplication.git &&
              cd ExampleApplication &&
              bash deploy.sh
            "

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test